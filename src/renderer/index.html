<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aero P2P Chat</title>
    <link rel="preload" href="boot-logo.png" as="image" />
    <style>
      :root {
        background: #83cbe9;
        color: #0d2f43;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 8%, rgba(255, 255, 255, 0.85), transparent 14rem),
          linear-gradient(145deg, #99def5 0%, #e4fff7 47%, #6dbce5 100%);
      }

      .hidden {
        display: none !important;
      }

      body.app-loading:not(.app-boot-finish) .window-frame {
        visibility: hidden;
      }

      body.app-boot-finish .window-frame {
        visibility: visible;
      }

      .boot-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 38%, rgba(119, 223, 248, 0.24), transparent 12rem),
          linear-gradient(180deg, #f8feff 0%, #e9fbff 54%, #d3f5ff 100%);
      }

      .boot-panel {
        display: grid;
        justify-items: center;
        gap: 14px;
        min-width: 210px;
        padding: 22px 24px;
      }

      .boot-logo {
        width: 82px;
        height: 82px;
        border-radius: 50%;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.52);
        padding: 5px;
        box-shadow:
          inset -8px -9px 14px rgba(0, 70, 110, 0.22),
          0 18px 36px rgba(0, 112, 158, 0.18);
        transform-origin: center;
        animation: bootLogoIdle 1.8s ease-in-out infinite;
        will-change: transform;
      }

      .boot-title {
        margin: 0;
        color: #07364f;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .boot-status {
        color: #477487;
        font-size: 12px;
        font-weight: 800;
      }

      .boot-progress {
        width: 178px;
        height: 6px;
        overflow: hidden;
        border: 1px solid rgba(41, 139, 171, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow:
          inset 0 1px 2px rgba(16, 94, 126, 0.1),
          0 6px 14px rgba(0, 112, 158, 0.08);
      }

      .boot-progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #3fbde3, #83e8ff 48%, #19a5d5);
        box-shadow: 0 0 12px rgba(25, 165, 213, 0.36);
        transition: width 360ms cubic-bezier(0.22, 0.8, 0.2, 1);
      }

      .boot-percent {
        min-height: 12px;
        color: #5a8393;
        font-size: 10px;
        font-weight: 800;
        line-height: 1;
      }

      .boot-dots {
        display: flex;
        gap: 5px;
      }

      .boot-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #149ac7;
        animation: bootPulse 0.9s ease-in-out infinite;
      }

      .boot-dots span:nth-child(2) {
        animation-delay: 0.12s;
      }

      .boot-dots span:nth-child(3) {
        animation-delay: 0.24s;
      }

      body:not(.app-loading) .boot-screen {
        display: none;
      }

      body.app-boot-finish .boot-screen {
        pointer-events: none;
        animation: bootFadeOut 960ms ease forwards;
      }

      body.app-boot-finish .boot-panel {
        animation: bootPanelExit 960ms cubic-bezier(0.2, 0.82, 0.2, 1) forwards;
      }

      body.app-boot-finish .boot-logo {
        animation: bootLogoDock 960ms cubic-bezier(0.2, 0.82, 0.2, 1) forwards;
      }

      body.app-boot-finish .boot-title,
      body.app-boot-finish .boot-status,
      body.app-boot-finish .boot-progress,
      body.app-boot-finish .boot-percent,
      body.app-boot-finish .boot-dots {
        animation: bootTextExit 220ms ease forwards;
      }

      @keyframes bootPulse {
        0%,
        100% {
          opacity: 0.35;
          transform: translateY(0);
        }

        50% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }

      @keyframes bootLogoIdle {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }

        50% {
          transform: translateY(-5px) scale(1.035);
        }
      }

      @keyframes bootTextExit {
        to {
          opacity: 0;
          transform: translateY(6px);
        }
      }

      @keyframes bootPanelExit {
        to {
          transform: translate(
            var(--boot-delta-x, 0),
            var(--boot-delta-y, 0)
          );
        }
      }

      @keyframes bootLogoDock {
        to {
          transform: scale(0.3);
        }
      }

      @keyframes bootFadeOut {
        0%,
        78% {
          opacity: 1;
        }

        100% {
          opacity: 0;
        }
      }
    </style>
    <script type="module" src="/index.js"></script>
  </head>
  <body class="app-loading">
    <div id="boot-screen" class="boot-screen" aria-label="Loading Aero P2P Chat">
      <section class="boot-panel">
        <img class="boot-logo" src="boot-logo.png" alt="" aria-hidden="true" />
        <h1 class="boot-title">Aero P2P Chat</h1>
        <span id="boot-status" class="boot-status">Loading interface</span>
        <div class="boot-progress" aria-hidden="true">
          <div id="boot-progress-fill" class="boot-progress-fill"></div>
        </div>
        <span id="boot-percent" class="boot-percent">0%</span>
        <div class="boot-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </div>
    <div class="window-frame">
      <header class="titlebar">
        <div class="titlebar-brand">
          <img id="titlebar-logo" class="titlebar-logo" alt="" aria-hidden="true" />
          <div>
            <strong>Aero P2P Chat</strong>
            <span id="titlebar-subtitle">Ready</span>
          </div>
        </div>
        <div class="titlebar-shine" aria-hidden="true"></div>
        <div class="window-controls">
          <button id="header-update-button" class="header-update-button hidden" type="button">Update</button>
          <button id="window-minimize" type="button" title="Minimize" aria-label="Minimize">
            <i class="fa-solid fa-minus" aria-hidden="true"></i>
          </button>
          <button id="window-maximize" type="button" title="Maximize" aria-label="Maximize">
            <i class="fa-regular fa-square" aria-hidden="true"></i>
          </button>
          <button id="window-close" class="window-close" type="button" title="Close" aria-label="Close">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
      </header>
      <main class="app-shell">
      <section class="connection-panel" aria-label="Connection">
        <div class="id-card">
          <span class="label">My Aero ID</span>
          <div class="id-row">
            <code id="own-id">creating...</code>
            <button id="copy-id" class="icon-button" type="button" title="Copy peer ID" aria-label="Copy peer ID">
              <i class="fa-regular fa-copy" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <form id="connect-form" class="connect-form">
          <label for="remote-id">Friend Aero ID</label>
          <div class="connect-row">
            <input id="remote-id" name="remote-id" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="aero-..." />
            <button id="connect-button" type="submit" disabled>
              <i class="fa-solid fa-link" aria-hidden="true"></i>
              <span>Connect</span>
            </button>
          </div>
        </form>

        <div class="status-region" aria-live="polite">
          <span id="status-dot" class="status-dot pending" aria-hidden="true"></span>
          <span id="status-text">Initializing peer...</span>
        </div>

        <div id="update-card" class="update-card hidden">
          <span class="label">Update</span>
          <strong id="update-title">Update available</strong>
          <p id="update-text"></p>
          <button id="update-button" type="button">Update</button>
        </div>

        <div class="peers-card">
          <span class="label">Contacts</span>
          <div id="peer-list" class="peer-list">
            <span class="empty-peer">No contacts yet</span>
          </div>
        </div>
      </section>

      <section class="chat-panel" aria-label="Chat">
        <header class="chat-header">
          <div>
            <span class="label">Chat</span>
            <h2 id="chat-title">Ready to connect</h2>
          </div>
          <div class="chat-actions">
            <button id="call-chat" class="ghost-button call" type="button" disabled title="Start voice call">
              <i class="fa-solid fa-phone" aria-hidden="true"></i>
              <span>Call</span>
            </button>
            <button id="disconnect-chat" class="ghost-button danger" type="button" disabled>
              <i class="fa-solid fa-plug-circle-xmark" aria-hidden="true"></i>
              <span>Disconnect</span>
            </button>
            <button id="clear-chat" class="ghost-button" type="button">
              <i class="fa-regular fa-trash-can" aria-hidden="true"></i>
              <span>Clear</span>
            </button>
          </div>
        </header>

        <div id="call-banner" class="call-banner hidden" aria-live="polite">
          <span id="call-text">Voice call</span>
          <div class="call-banner-actions">
            <button id="call-accept" type="button" class="call-action accept hidden">
              <i class="fa-solid fa-phone" aria-hidden="true"></i>
              <span>Accept</span>
            </button>
            <button id="call-decline" type="button" class="call-action decline hidden">
              <i class="fa-solid fa-phone-slash" aria-hidden="true"></i>
              <span>Decline</span>
            </button>
            <button id="call-mute" type="button" class="call-action toggle hidden" title="Mute microphone" aria-label="Mute microphone">
              <i class="fa-solid fa-microphone" aria-hidden="true"></i>
              <span>Mute</span>
            </button>
            <button id="call-deafen" type="button" class="call-action toggle hidden" title="Deafen" aria-label="Deafen">
              <i class="fa-solid fa-headphones" aria-hidden="true"></i>
              <span>Deafen</span>
            </button>
            <button id="call-hangup" type="button" class="call-action hangup hidden">
              <i class="fa-solid fa-phone-slash" aria-hidden="true"></i>
              <span>Hang up</span>
            </button>
          </div>
        </div>

        <div id="messages" class="messages empty" aria-live="polite" data-empty="Share your Aero ID or connect to a contact."></div>

        <form id="message-form" class="message-form">
          <input id="message-input" name="message" autocomplete="off" placeholder="Write a message..." disabled />
          <button id="send-button" type="submit" disabled>
            <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
            <span>Send</span>
          </button>
        </form>
      </section>
      </main>
    </div>

    <div id="update-modal" class="modal-layer hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <section class="modal-panel">
        <header class="modal-header">
          <h2 id="modal-title">Linux update</h2>
          <button id="modal-close" class="ghost-button" type="button">Close</button>
        </header>
        <p id="modal-text"></p>
        <code id="linux-command" class="command-box"></code>
        <button id="copy-update-command" type="button">Copy command</button>
      </section>
    </div>

    <div id="settings-modal" class="modal-layer hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <section class="modal-panel">
        <header class="modal-header">
          <h2 id="settings-title">Settings</h2>
          <button id="settings-close" class="ghost-button" type="button">Close</button>
        </header>
        <div class="settings-field">
          <span class="label">My nickname</span>
          <div class="settings-row">
            <input id="nickname-input" type="text" maxlength="32" placeholder="Nickname" />
            <button id="save-nickname" type="button">Save</button>
          </div>
        </div>
        <div class="settings-field">
          <span class="label">Voice devices</span>
          <div class="device-settings">
            <label for="microphone-select">Microphone</label>
            <select id="microphone-select"></select>
            <label for="speaker-select">Output</label>
            <select id="speaker-select"></select>
          </div>
        </div>
        <span class="label">Contact nicknames</span>
        <div id="contact-nickname-list" class="contact-nickname-list"></div>
        <span class="label">Blocked users</span>
        <div id="blocked-list" class="blocked-list"></div>
      </section>
    </div>

    <div id="app-menu" class="context-menu hidden" role="menu">
      <button id="app-menu-settings" type="button" role="menuitem">
        <i class="fa-solid fa-gear" aria-hidden="true"></i>
        <span>Settings</span>
      </button>
    </div>

    <div id="contact-menu" class="context-menu hidden" role="menu">
      <button id="menu-trust" type="button" role="menuitem">
        <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
        <span>Trust</span>
      </button>
      <button id="menu-pin" type="button" role="menuitem">
        <i class="fa-solid fa-thumbtack" aria-hidden="true"></i>
        <span>Pin</span>
      </button>
      <button id="menu-nickname" type="button" role="menuitem">
        <i class="fa-solid fa-pen" aria-hidden="true"></i>
        <span>Add nickname</span>
      </button>
      <button id="menu-block" type="button" role="menuitem">
        <i class="fa-solid fa-ban" aria-hidden="true"></i>
        <span>Block</span>
      </button>
    </div>

    <div id="message-menu" class="context-menu hidden" role="menu">
      <button id="menu-copy" type="button" role="menuitem">
        <i class="fa-solid fa-copy" aria-hidden="true"></i>
        <span>Copy</span>
      </button>
      <button id="menu-delete" type="button" role="menuitem" class="danger">
        <i class="fa-solid fa-trash" aria-hidden="true"></i>
        <span>Delete</span>
      </button>
    </div>
  </body>
</html>
