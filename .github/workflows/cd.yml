name: CD

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        platform:
          - os_name: Linux-x64
            os: ubuntu-22.04
            build_platform: linux
          - os_name: Windows-x64
            os: windows-latest
            build_platform: windows
          - os_name: macOS-Universal
            os: macos-latest
            build_platform: macos

    runs-on: ${{ matrix.platform.os }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: matrix.platform.build_platform == 'linux'
        run: sudo apt-get update --yes && sudo apt-get install --yes libarchive-tools rpm

      - name: Install Inno Setup
        if: matrix.platform.build_platform == 'windows'
        run: choco install innosetup --no-progress --yes

      - name: Test
        run: npm run test

      - name: Build release packages
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/ci-build-release.cjs --platform=${{ matrix.platform.build_platform }} --version=${{ github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform.os_name }}
          path: dist/release/*
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create latest.yml
        run: node scripts/ci-create-latest.cjs ./artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            ./artifacts/latest.yml
            ./artifacts/artifacts-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
